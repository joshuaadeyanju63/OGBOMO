<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routes & Crews — Ogbomọ́ Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar"></aside>
  <div class="admin-topbar">
    <span class="topbar-page-title">Routes &amp; Crews</span>
    <div class="topbar-right">
      <span class="topbar-lga-badge" id="topbar-lga">All LGAs</span>
      <span class="topbar-time mono" id="topbar-time"></span>
    </div>
  </div>

  <main class="admin-main">
    <!-- Route summary KPIs -->
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr); margin-bottom:1.25rem;" id="route-kpis"></div>

    <div class="admin-panel">
      <div class="panel-header">
        <span class="panel-title">Today's Dispatch Board</span>
        <div style="display:flex;gap:0.5rem;">
          <select class="admin-select" id="filter-stream">
            <option value="">All streams</option>
            <option>Ilé</option><option>Ọjà</option><option>Kòtò</option>
          </select>
          <select class="admin-select" id="filter-status">
            <option value="">All statuses</option>
            <option value="collected">Collected</option>
            <option value="progress">In Progress</option>
            <option value="pending">Pending</option>
            <option value="delayed">Delayed</option>
          </select>
        </div>
      </div>
      <table class="data-table">
        <thead><tr><th>Route</th><th>Location</th><th>LGA</th><th>Stream</th><th>Scheduled</th><th>Crew</th><th>Status</th><th>Update</th></tr></thead>
        <tbody id="routes-tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="admin-auth.js"></script>
<script>
AdminAuth.protectAdminPage();
document.getElementById('sidebar').innerHTML = buildSidebar('routes');
AdminAuth.renderSidebarUser();
AdminAuth.markActiveSidebarLink();
document.getElementById('sidebar-logout-btn').addEventListener('click', AdminAuth.logout);
function tick() { document.getElementById('topbar-time').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
tick(); setInterval(tick,1000);
const lga = AdminAuth.getAssignedLGA();
document.getElementById('topbar-lga').textContent = lga || 'All LGAs';

let ROUTES = [
  { code:'RT-014', location:'Wazo Market',    lgaName:'Ogbomosho North', stream:'Ọjà',  time:'7:15 AM', crew:'Crew A', status:'collected' },
  { code:'RT-021', location:'Ayanyan Market', lgaName:'Ogbomosho North', stream:'Ọjà',  time:'7:30 AM', crew:'Crew A', status:'collected' },
  { code:'RT-008', location:'Masifa Road',    lgaName:'Ogbomosho North', stream:'Kòtò', time:'8:00 AM', crew:'Crew B', status:'progress'  },
  { code:'RT-033', location:'Oke Elerin',     lgaName:'Ogbomosho North', stream:'Ilé',  time:'8:15 AM', crew:'Crew B', status:'progress'  },
  { code:'RT-019', location:'Aarada Market',  lgaName:'Ogbomosho South', stream:'Ọjà',  time:'8:45 AM', crew:'Crew C', status:'pending'   },
  { code:'RT-027', location:'Molete',         lgaName:'Ogbomosho South', stream:'Ilé',  time:'9:00 AM', crew:'Crew C', status:'pending'   },
  { code:'RT-011', location:'Oke Alapata',    lgaName:'Ogbomosho North', stream:'Kòtò', time:'9:20 AM', crew:'Crew D', status:'delayed'   },
  { code:'RT-042', location:'Ikoyi-Ile',      lgaName:'Oriire',          stream:'Ilé',  time:'9:45 AM', crew:'Crew E', status:'pending'   },
];

const BADGE  = { collected:'badge-collected', progress:'badge-progress', pending:'badge-pending', delayed:'badge-delayed' };
const BLABEL = { collected:'Collected', progress:'In Progress', pending:'Pending', delayed:'Delayed' };

if (!AdminAuth.isSuperAdmin()) ROUTES = ROUTES.filter(r => r.lgaName === lga);

function renderKPIs() {
  const done = ROUTES.filter(r=>r.status==='collected').length;
  const prog = ROUTES.filter(r=>r.status==='progress').length;
  const pend = ROUTES.filter(r=>r.status==='pending').length;
  const del  = ROUTES.filter(r=>r.status==='delayed').length;
  document.getElementById('route-kpis').innerHTML = `
    <div class="kpi-card kpi-accent-green"><span class="kpi-label">Collected</span><span class="kpi-value">${done}</span></div>
    <div class="kpi-card kpi-accent"><span class="kpi-label">In Progress</span><span class="kpi-value">${prog}</span></div>
    <div class="kpi-card kpi-accent-gold"><span class="kpi-label">Pending</span><span class="kpi-value">${pend}</span></div>
    <div class="kpi-card kpi-accent-red"><span class="kpi-label">Delayed</span><span class="kpi-value">${del}</span></div>`;
}

function renderRoutes() {
  const fStream = document.getElementById('filter-stream').value;
  const fStatus = document.getElementById('filter-status').value;
  const rows = ROUTES.filter(r => (!fStream || r.stream === fStream) && (!fStatus || r.status === fStatus));
  const tbody = document.getElementById('routes-tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="mono" style="font-size:0.75rem;font-weight:700;">${r.code}</td>
      <td>${r.location}</td>
      <td style="color:var(--ink-soft);font-size:0.8rem;">${r.lgaName}</td>
      <td>${r.stream}</td>
      <td class="mono" style="font-size:0.78rem;">${r.time}</td>
      <td style="color:var(--ink-soft);">${r.crew}</td>
      <td><span class="badge ${BADGE[r.status]}" id="rbadge-${r.code}">${BLABEL[r.status]}</span></td>
      <td>
        <select class="admin-select" style="font-size:0.78rem;" onchange="updateRoute('${r.code}', this.value)">
          <option value="collected" ${r.status==='collected'?'selected':''}>Collected</option>
          <option value="progress"  ${r.status==='progress'?'selected':''}>In Progress</option>
          <option value="pending"   ${r.status==='pending'?'selected':''}>Pending</option>
          <option value="delayed"   ${r.status==='delayed'?'selected':''}>Delayed</option>
        </select>
      </td>`;
    tbody.appendChild(tr);
  });
}

function updateRoute(code, newStatus) {
  const r = ROUTES.find(x => x.code === code);
  if (r) { r.status = newStatus; renderKPIs(); renderRoutes(); }
}

['filter-stream','filter-status'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderRoutes);
});

renderKPIs();
renderRoutes();

function buildSidebar(active) {
  const s = AdminAuth.isSuperAdmin();
  return `<div class="sidebar-brand"><div class="sidebar-brand-name">OGBOMỌ́</div><div class="sidebar-brand-sub">Admin Portal</div></div>
  <div id="sidebar-role-badge" class="sidebar-role-badge ${s?'':'council'}"><span class="sidebar-role-dot"></span><span id="sidebar-role-label">${s?'Super Admin':'Council Officer'}</span></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Overview</div>
    <a href="admin-dashboard.html" class="sidebar-link"><span class="icon">◼</span>Dashboard</a>
    <div class="sidebar-section-label">Operations</div>
    <a href="admin-reports.html" class="sidebar-link"><span class="icon">🎫</span>Reports<span class="notif-dot"></span></a>
    <a href="admin-routes.html" class="sidebar-link ${active==='routes'?'active':''}"><span class="icon">🚛</span>Routes & Crews</a>
    ${s?`<div class="sidebar-section-label">Finance</div><a href="admin-wallet.html" class="sidebar-link"><span class="icon">💰</span>CleanPoints & Wallet</a>
    <div class="sidebar-section-label">Platform</div><a href="admin-users.html" class="sidebar-link"><span class="icon">👥</span>Users</a>`:''}
    <div class="sidebar-section-label">Account</div><a href="index.html" class="sidebar-link"><span class="icon">↗</span>Public Site</a>
  </nav>
  <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar" id="sidebar-avatar">KN</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Loading…</div><div class="sidebar-user-role" id="sidebar-user-role"></div></div></div><button class="sidebar-logout" id="sidebar-logout-btn">Sign out</button></div>`;
}
</script>
</body>
</html>
